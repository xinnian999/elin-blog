version: '3.8'

services:
  db:
    image: mysql:5.7.29  # 使用 MySQL 5.7.29 镜像
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: 991015  # 设置 MySQL root 密码
      MYSQL_DATABASE: blog         # 创建一个默认数据库
    ports:
      - "3306:3306"                # 将容器的 3306 端口映射到宿主机的 3306 端口
    networks:
      - app-network
    volumes:
      - mysql-data:/var/lib/mysql  # 持久化数据，防止容器重启时丢失数据库数据
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_general_ci"]


networks:
  app-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local

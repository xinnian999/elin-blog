x-common-environment: &common-environment
  TZ: Asia/Shanghai
  DB_HOST: elin-blog-db
  DB_PORT: "3306"
  DB_USER: root
  DB_PASSWORD: 991015
  DB_NAME: blog

services:
  blog:
    build:
      context: . # 当前目录
      dockerfile: Dockerfile
      args:
        TARGET: blog # 传递 TARGET 参数为 blog
    image: crpi-a7p27yxlrmekg1a3.cn-beijing.personal.cr.aliyuncs.com/elin/elin-blog:latest
    container_name: elin-blog
    ports:
      - "3000:3000"
    networks:
      - app-network
    environment:
      <<: *common-environment

  admin:
    build:
      context: . # 当前目录
      dockerfile: Dockerfile
      args:
        TARGET: admin # 传递 TARGET 参数为 admin
    image: crpi-a7p27yxlrmekg1a3.cn-beijing.personal.cr.aliyuncs.com/elin/elin-blog-admin:latest
    container_name: elin-blog-admin
    ports:
      - "3001:3000"
    networks:
      - app-network
    environment:
      <<: *common-environment
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: 991015
      
  db:
    image: mysql:5.7.29
    container_name: elin-blog-db
    environment:
      MYSQL_ROOT_PASSWORD: 991015
      MYSQL_DATABASE: blog
    ports:
      - "3306:3306"
    networks:
      - app-network
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      [
        "mysqld",
        "--character-set-server=utf8mb4",
        "--collation-server=utf8mb4_general_ci",
        "--default-time-zone=+08:00",
      ]
      
  db-view:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8080:80"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
